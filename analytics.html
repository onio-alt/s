<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика данных - Родион Александрович</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            color: #ffffff;
            text-align: center;
            padding-top: 100px;
            margin: 0;
        }

        .content {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 20px;
            display: inline-block;
        }

        h1 {
            font-size: 2.5em;
            margin: 20px 0;
        }

        img {
            max-width: 300px;
            width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div class="content">
        <img src="path_to_your_photo.jpg" alt="Родион Александрович">
        <h1>Родион Александрович</h1>
    </div>
</body>

</html>
